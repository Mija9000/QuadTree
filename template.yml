AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: API Gateway para Quadtree Simulation

Parameters:
  BackendUrl:
    Type: String
    Default: "http://44.206.225.167:8080"
    Description: "URL del backend en Fargate"

Resources:
  # API Gateway HTTP API
  QuadtreeApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: QuadTreeAPI
      ProtocolType: HTTP
      Description: "API Gateway para Quadtree Simulation"
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 86400

  # Definición de integración con el backend
  QuadtreeIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref QuadtreeApi
      IntegrationType: HTTP_PROXY
      IntegrationMethod: ANY
      IntegrationUri: !Ref BackendUrl
      ConnectionType: INTERNET
      PayloadFormatVersion: "1.0"
      TimeoutInMillis: 30000

  # Ruta raíz
  RootRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref QuadtreeApi
      RouteKey: "ANY /"
      Target: !Join ["/", ["integrations", !Ref QuadtreeIntegration]]

  # Ruta comodín para todas las rutas (/{proxy+})
  ProxyRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref QuadtreeApi
      RouteKey: "ANY /{proxy+}"
      Target: !Join ["/", ["integrations", !Ref QuadtreeIntegration]]

  # Etapa de despliegue (stage)
  QuadtreeStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref QuadtreeApi
      StageName: prod
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50

# Salidas (Outputs)
Outputs:
  ApiEndpoint:
    Description: "URL de la API Gateway"
    Value: !Sub "https://${QuadtreeApi}.execute-api.${AWS::Region}.amazonaws.com/prod"